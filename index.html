<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Real Estate CRM - Premium</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="dark-mode">

    <div class="app-wrapper">
        <header class="search-header">
            <input type="text" id="searchInput" placeholder="ძებნა (ID, ტელეფონი, სიტყვა)..." oninput="global_filterTable()">
        </header>

        <main class="content-area">
            <div class="table-responsive">
                <table id="crmTable">
                    <thead>
                        <tr>
                            <th>მესაკუთრე</th>
                            <th>ტელეფონი</th>
                            <th>Link</th>
                            <th>გარიგება</th>
                            <th>ტიპი</th>
                            <th>ლოკაცია & ფასი</th>
                            <th>სოც. ნებართვა</th>
                            <th>პირობები</th>
                            <th>კომენტარი</th>
                            <th>Agency ID</th>
                            <th>კლიენტის სახელი</th>
                            <th>კლიენტის ტელ</th>
                            <th>შედეგი</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>
        </main>

        <button class="fab-add" onclick="global_openModal()">+</button>

        <div id="aiModal" class="modal-overlay">
            <div class="modal">
                <h3>ახალი განცხადება</h3>
                <textarea id="aiInput" placeholder="ჩაწერეთ ტექსტი... (მაგ: ქირავდება ბინა აბაშიძეზე...)"></textarea>
                <div class="modal-actions">
                    <button class="btn-cancel" onclick="global_closeModal()">გაუქმება</button>
                    <button class="btn-save" onclick="global_processManualEntry()">დამატება</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
