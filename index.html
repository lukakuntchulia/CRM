<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Real Estate CRM - Final Pro</title>
    <link rel="stylesheet" href="style.css?v=11">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="dark-mode">

    <div class="app-wrapper">
        <header class="search-header">
            <input type="text" id="searchInput" placeholder="ძებნა (ID, ტელეფონი, სიტყვა)..." oninput="window.global_filterTable()">
            <button class="settings-btn" onclick="window.global_openSettings()">⚙️</button>
        </header>

        <main class="content-area">
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>მესაკუთრე</th>
                            <th>ტელეფონი</th>
                            <th>Link</th>
                            <th>გარიგება</th>
                            <th>ტიპი</th>
                            <th>ლოკაცია & ფასი</th>
                            <th>სოც. ნებართვა</th>
                            <th>პირობები</th>
                            <th>კომენტარი</th>
                            <th>Agency ID</th>
                            <th>კლიენტის სახელი</th>
                            <th>კლიენტის ტელ</th>
                            <th>შედეგი</th>
                            <th>მოქმედება</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </main>

        <button class="fab-add" onclick="window.global_openModal()">+</button>

        <div id="aiModal" class="modal-overlay">
            <div class="modal">
                <h3>🤖 ახალი განცხადება</h3>
                <textarea id="aiInput" placeholder="ჩაწერეთ ტექსტი..."></textarea>
                <div class="modal-actions">
                    <button class="btn-cancel" onclick="window.global_closeModal('aiModal')">გაუქმება</button>
                    <button id="processBtn" class="btn-save" onclick="window.global_processAI()">დამუშავება</button>
                </div>
            </div>
        </div>

        <div id="settingsModal" class="modal-overlay">
            <div class="modal">
                <h3>⚙️ პარამეტრები</h3>
                <p>შეიყვანეთ API Key:</p>
                <input type="password" id="apiKeyInput" placeholder="sk-or-v1-...">
                <div class="modal-actions">
                    <button class="btn-cancel" onclick="window.global_closeModal('settingsModal')">დახურვა</button>
                    <button class="btn-save" onclick="window.global_saveApiKey()">შენახვა</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js?v=11"></script>
</body>
</html>
